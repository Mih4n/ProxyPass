name: build
on:
  push:
    branches:
      - main
    paths:
      - src/**
      - CMakeLists.txt
  pull_request:
    branches:
      - main
    paths:
      - src/**
      - CMakeLists.txt
  workflow_dispatch:

jobs:
  build-on-windows-amd64:
    name: Build on Windows AMD64 (MSVC)
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyPass-windows-amd64-${{ github.sha }}
          path: bin/ProxyPass*
          retention-days: 15

  build-on-windows-arm64:
    name: Build on Windows ARM64 (MSVC)
    runs-on: windows-11-vs2026-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyPass-windows-arm64-${{ github.sha }}
          path: bin/ProxyPass*
          retention-days: 15

  build-on-linux-gnu-x86_64:
    name: Build on Linux GNU X86_64 (GCC)
    runs-on: ubuntu-24.04
    container:
      image: gcc:15
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Install Dependencies
        run: apt-get update && apt-get install -y ninja-build cmake

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyPass-linux-gnu-x86_64-${{ github.sha }}
          path: bin/ProxyPass*
          retention-days: 15

  build-on-linux-gnu-arm64:
    name: Build on Linux GNU ARM64 (GCC)
    runs-on: ubuntu-24.04-arm
    container:
      image: gcc:15
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Install Dependencies
        run: apt-get update && apt-get install -y ninja-build cmake

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyPass-linux-gnu-arm64-${{ github.sha }}
          path: bin/ProxyPass*
          retention-days: 15

  build-on-linux-musl-x86_64:
    name: Build on Linux musl X86_64 (Alpine)
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.24.1
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: apk add --no-cache build-base cmake ninja git openssl-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyPass-linux-musl-x86_64-${{ github.sha }}
          path: bin/ProxyPass*
          retention-days: 15

  build-on-linux-musl-arm64:
    name: Build on Linux musl ARM64 (Alpine)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build in Alpine Container
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            alpine:3.24.1 \
            sh -lc '
              apk add --no-cache build-base cmake ninja git openssl-dev &&
              cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release &&
              cmake --build build --config Release --parallel
            '

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyPass-linux-musl-arm64-${{ github.sha }}
          path: bin/ProxyPass*
          retention-days: 15

  build-on-macos-arm64:
    name: Build on MacOS ARM64 (Apple Clang)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Configure OpenSSL
        run: echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyPass-macos-arm64-${{ github.sha }}
          path: bin/ProxyPass*
          retention-days: 15

  build-on-macos-intel:
    name: Build on MacOS X86_64 (Apple Clang)
    runs-on: macos-26-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Configure OpenSSL
        run: echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyPass-macos-intel-${{ github.sha }}
          path: bin/ProxyPass*
          retention-days: 15
